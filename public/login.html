<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login — Secretchats</title>
  <link rel="stylesheet" href="/assets/auth.css" />
</head>
<body>
  <div id="page-fade"></div>
  <canvas id="particle-canvas"></canvas>
  <img src="/assets/divineflute.png" alt="Krishna Flute" class="divine-flute" />
  <div class="auth-container">
    <h2>Welcome Back ✨</h2>
    <form id="login-form" autocomplete="off">
      <input type="text"     id="username" placeholder="Username"  autocomplete="username" />
      <input type="password" id="password" placeholder="Password"  autocomplete="current-password" />
      <button type="submit"  id="login-btn">Login Now</button>
    </form>
    <p>Don't have an account? <a href="/signup.html">Sign up</a></p>
  </div>
  <audio id="bg-music" loop preload="auto">
    <source src="/assets/divine.mp3" type="audio/mpeg">
  </audio>
<script src="./authEngine.js"></script>
  <script src="/login.js"></script>
</body>
</html>
